<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrollFC bóng đá</title>
  <link rel="icon" href="/assets/img/football.png?v=2">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="card">
    <h1>Xin chào, đây là trang của <span>TrollFC</span></h1>

    <div class="buttons">
      <a class="btn primary" href="home/">Vào trong</a>
      <a type="button" class="btn secondary" onclick="openPopup()">Điền form</a>
    </div>

    <div class="admin-link-wrap">
      <a href="home/admin/" class="admin-link">⚙ Quản lý</a>
    </div>

    <footer>
      © 2025 · Huy Lơ ❤️ from GitHub Pages
    </footer>
  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-box">
      <h3>🔐 Nhập mật khẩu</h3>

      <!-- INPUT + TOGGLE -->
      <div class="password-wrapper">
        <input
          type="password"
          id="passwordInput"
          placeholder="Mật khẩu..."
        />
        <button id="togglePassword" type="button" title="Hiện / Ẩn mật khẩu">
          🙉
        </button>
      </div>

      <p id="errorText"></p>

      <div class="popup-buttons">
        <button type="button" onclick="checkPassword()">Xác nhận</button>
        <button type="button" class="cancel" onclick="closePopup()">Huỷ</button>
      </div>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
</body>

</html>
