<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quay nhóm</title>
  <link rel="stylesheet" href="draw.css">
  <link rel="icon" href="/assets/img/football.png">
</head>

<body>
  <h1>🎯 Quay chọn nhóm</h1>

  <section class="panel">
    <h2>📋 Danh sách đã sắp xếp</h2>
    <div id="listPreview"></div>
  </section>

  <section class="panel">
    <h2>🎡 Xoay vòng tròn</h2>

    <div class="spin-box">
      <div class="controls">
        <select id="groupSelect"></select>
        <button id="btnSpin">🎯 SPIN</button>
        <button id="btnReset">🔄 Reset</button>
        <button id="btnReload">🔁 Reset từ đầu</button>

        <div id="reserveBox" style="display:none">
          <input id="reserveInput" placeholder="Tên dự bị, cách nhau dấu ," />
          <button id="btnReserve">➕ Thêm</button>
        </div>
      </div>

      <div class="wheel-wrapper">
        <canvas id="wheel" width="420" height="420"></canvas>
        <div class="wheel-pointer">▶</div>
      </div>

      <div class="spin-result" id="slot">Chưa quay</div>
    </div>
  </section>

  <section class="panel">
    <h2>📋 Danh sách chia nhóm</h2>
    <table class="data-table">
      <thead>
        <tr>
          <th>Nhóm</th>
          <th>Tên</th>
          <th>Điểm TB</th>
          <th>Xóa</th>
        </tr>
      </thead>
      <tbody id="groupTable"></tbody>
    </table>
  </section>

  <canvas id="confetti"></canvas>
  <div id="toast" class="toast"></div>

  <script src="draw.js"></script>
</body>
</html>
